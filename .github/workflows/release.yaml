name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ARM64 binaries
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --output type=local,dest=./bin \
            --file Containerfile.build \
            .

      - name: Package release
        run: |
          mkdir -p dist/amneziawg/bin dist/amneziawg/conf
          cp bin/* dist/amneziawg/bin/
          cp scripts/*.sh dist/amneziawg/
          cp scripts/amneziawg.service dist/amneziawg/
          cp configs/awg0.conf.example dist/amneziawg/conf/
          chmod +x dist/amneziawg/*.sh dist/amneziawg/bin/*
          cd dist && tar czf amneziawg-unifi-arm64.tar.gz amneziawg/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/amneziawg-unifi-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
